[project]
name = "fullstack-starter"
version = "0.1.0"
description = "A fullstack Jac starter — auth, backend functions, and a React frontend"
entry-point = "main.jac"

[dependencies.npm]
tailwindcss = "^4.1.17"
"@tailwindcss/vite" = "^4.1.17"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"
twilio = ">=9.0.0"

[serve]
base_route_app = "app"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[jacpack]
name = "jac_test"
description = "Jac IDE snapshot for jac_test"
